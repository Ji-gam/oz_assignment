<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            margin: 0;
            padding: 60px;
        }

        .container {
            padding: 5%;
            display: grid;
            gap: 8px;
            grid-template-columns: 1fr 1fr 1fr;
            grid-template-rows: repeat(4, 200px);

            grid-template-areas:
            "img1 img2 img2"
            "img1 img4 img6"
            "img3 img3 img6"
            "img5 img5 img5";
        }

        .container .item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 10px;
        }

        /*hover를 받지 못한 이미지만 색상 제거*/
        .container:hover .item img:not(:hover) {
            filter: grayscale(1);
            opacity: 0.5;
        }

        .img1 {
            grid-area: img1;
        }

        .img2 {
            grid-area: img2;
        }

        .img3 {
            grid-area: img3;
        }

        .img4 {
            grid-area: img4;
        }

        .img5 {
            grid-area: img5;
        }

        .img6 {
            grid-area: img6;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="item img1"><img src="https://images.unsplash.com/photo-1533048324814-79b0a31982f1?q=80&w=1536&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" alt=""></div>
        <div class="item img2"><img src="https://images.unsplash.com/photo-1564514476902-542f8c30121e?q=80&w=1335&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" alt=""></div>
        <div class="item img3"><img src="https://images.unsplash.com/photo-1599631438215-75bc2640feb8?w=700&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8M3x8JUVCJTgyJTk4JUVCJUI5JTg0fGVufDB8fDB8fHww" alt=""></div>
        <div class="item img4"><img src="https://images.unsplash.com/photo-1623474237394-055b5c5b9095?w=700&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MTV8fCVFQiU4MiU5OCVFQiVCOSU4NHxlbnwwfHwwfHx8MA%3D%3D" alt=""></div>
        <div class="item img5"><img src="https://images.unsplash.com/photo-1587405254461-abd1d1c7440e?w=700&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MTl8fCVFQiU4MiU5OCVFQiVCOSU4NHxlbnwwfHwwfHx8MA%3D%3D" alt=""></div>
        <div class="item img6"><img src="https://plus.unsplash.com/premium_photo-1710462716826-a837008e3dbf?w=700&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MTd8fCVFQiU4MiU5OCVFQiVCOSU4NHxlbnwwfHwwfHx8MA%3D%3D" alt=""></div>
    </div>
    
</body>
</html>
