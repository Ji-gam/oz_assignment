<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container {
            display: flex;
        }

        .box {
            background-color: skyblue;
            border: 1px solid black;
            flex: 1;
            text-align: center;
        }

        @media (max-width: 300px) {
            .container {
                flex-direction: column;
            }

            .box {
                background-color: orange;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="box">게시판</div>
        <div class="box">거래 목록</div>
        <div class="box">최근 구매 내역</div>
        <div class="box">내 정보</div>
    </div>
</body>
</html>
