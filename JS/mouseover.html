<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <p style="border: 1px solid black" id = box>마우스를 올려보세요.</p>

    <script>
        const box = document.querySelector("#box");

        function chageTextColor(color) {
            box.style.color = color;
            box.style.border = "1px solid" + color;
        }

        

        box.addEventListener("mouseover", () => chageTextColor("orange"));
        box.addEventListener("mouseout", () => chageTextColor("black"));
    </script>
</body>
</html>
